<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }} — Admin</title>
  <link rel="icon" type="image/png" sizes="32x32" href="https://manish.rocks/favicon-32x32.png?v=4914ab79911de1b22c6b805fdc3a4d70" />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="admin">
  <div class="admin-shell">
    <nav class="admin-nav">
      <strong>CMS</strong>
      <a href="/admin/">Dashboard</a>
      <a href="/admin/plants">Plants</a>
      <a href="/admin/sources">Sources</a>
      <span class="muted">|</span>
      <a href="/about">About</a>
      <a href="/">Public site</a>
      <a href="/docs">API</a>
      <form class="search-form admin-nav-search" action="/search" method="get" role="search">
        <input type="search" name="q" placeholder="Search database…" autocomplete="off" />
        <button type="submit">Go</button>
      </form>
    </nav>
    {% if error %}
    <div class="err">{{ error }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
